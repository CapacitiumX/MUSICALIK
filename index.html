<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitium Studio Ultra AI - v3</title>
    
    <!-- Iconos y Estilos Premium -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon: #a855f7;
            --neon-pink: #ec4899;
            --bg: #050506;
            --panel: #0b0b0d;
        }

        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: white; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
            user-select: none;
        }

        .app-header {
            background: var(--panel); padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
        }
        .logo { font-size: 16px; font-weight: 900; background: linear-gradient(90deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        
        .workspace { flex: 1; display: flex; overflow: hidden; height: calc(100vh - 220px); }

        /* Sidebar de Herramientas */
        .control-sidebar {
            width: 340px; background: var(--panel); border-right: 1px solid var(--glass-border);
            padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }
        .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #a1a1aa; font-weight: 700; margin-top: 5px; border-left: 2px solid var(--neon); padding-left: 6px;}

        .tool-group {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px;
        }

        label { font-size: 12px; color: #a1a1aa; display: flex; justify-content: space-between; align-items: center; }
        input[type="range"] { width: 100%; accent-color: var(--neon); background: #222; border-radius: 4px; height: 4px; appearance: none; }
        input[type="text"], select { background: #111113; border: 1px solid var(--glass-border); color: white; padding: 8px; border-radius: 6px; outline: none; font-size: 13px; }
        
        .btn-action { background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: 0.2s; font-size: 12px; }
        .btn-action:hover { background: rgba(255,255,255,0.08); border-color: #555; }
        .btn-action.primary { background: linear-gradient(90deg, var(--neon), var(--neon-pink)); border: none; font-weight: 600; }
        .btn-action.danger { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); }
        .btn-action.danger:hover { background: rgba(239, 68, 68, 0.4); }

        /* Área de Monitorización */
        .preview-area { flex: 1; background: #010102; display: flex; align-items: center; justify-content: center; padding: 15px; position: relative; }
        .canvas-container { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.05); }
        canvas { display: block; max-width: 100%; max-height: 55vh; background: #000; }

        /* Línea de Tiempo e Historial */
        .timeline-section { background: var(--panel); border-top: 1px solid var(--glass-border); padding: 12px 20px; display: flex; flex-direction: column; gap: 10px; }
        .timeline-header { display: flex; align-items: center; justify-content: space-between; }
        .btn-group { display: flex; gap: 6px; }

        .timeline-container { position: relative; background: #111113; border-radius: 6px; height: 50px; border: 1px solid var(--glass-border); overflow: hidden; }
        .timeline-progress { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: rgba(168, 85, 247, 0.12); border-right: 2px solid var(--neon); pointer-events: none; z-index: 4; }
        
        .track-layer { position: absolute; top: 4px; bottom: 4px; background: linear-gradient(90deg, #1f1f23, #2d2d33); border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; color: #ccc; z-index: 2; border: 1px solid rgba(255,255,255,0.03); }

        #hiddenVideo, #hiddenCam, #bgImageHidden { display: none; }
        .status-overlay { position: absolute; top: 15px; right: 15px; background: rgba(236, 72, 153, 0.9); color: white; padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: bold; display: none; z-index: 6; box-shadow: 0 0 15px rgba(236, 72, 153, 0.4); }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="app-header">
        <div class="logo"><i class="fa-solid fa-wand-magic-sparkles"></i> CAPACITIUM STUDIO ULTRA AI</div>
        <div class="btn-group">
            <button class="btn-action" onclick="undo()"><i class="fa-solid fa-rotate-left"></i> Deshacer</button>
            <button class="btn-action" onclick="redo()"><i class="fa-solid fa-rotate-right"></i> Rehacer</button>
            <button class="btn-action primary" id="btnExport" onclick="exportVideo()"><i class="fa-solid fa-download"></i> Exportar Master Completo</button>
        </div>
    </div>

    <!-- Workspace -->
    <div class="workspace">
        <div class="control-sidebar">
            
            <!-- Entrada de Video y Cámara Viva -->
            <div class="panel-title">1. Entrada de Medios</div>
            <div class="tool-group">
                <button class="btn-action primary" onclick="document.getElementById('videoUpload').click()"><i class="fa-solid fa-file-video"></i> Importar Video Base</button>
                <input type="file" id="videoUpload" accept="video/*" style="display: none;" onchange="loadVideo(event)">
                
                <button class="btn-action" id="btnCam" onclick="toggleCamera()"><i class="fa-solid fa-video"></i> Activar Mi Cámara Web</button>
            </div>

            <!-- Set de Grabación Virtual (Chroma Key) -->
            <div class="panel-title">2. Set Virtual (Cámara Tipo Zoom)</div>
            <div class="tool-group">
                <label>Fondo de Escenario</label>
                <select id="bgScenario" onchange="changeScenario()">
                    <option value="none">Sin fondo (Cámara Normal)</option>
                    <option value="set_moderno">Estudio Moderno Neon (Monterrey Hub)</option>
                    <option value="misterio">Sombra e Historia (Misterio Nocturno)</option>
                    <option value="folclor">Cultura y Raíces (Tradicional)</option>
                    <option value="custom">Subir mi propio Escenario (.JPG/.PNG)</option>
                </select>
                <input type="file" id="customBgUpload" accept="image/*" style="display: none;" onchange="loadCustomBg(event)">
                
                <label>Tolerancia de Croma (Quitar Fondo)</label>
                <input type="range" id="chromaKeyTolerance" min="10" max="150" value="70" oninput="updateEditor()">
            </div>

            <!-- Banda Sonora Real Streamed -->
            <div class="panel-title">3. Banda Sonora Instrumental Real</div>
            <div class="tool-group">
                <label>Pistas Ambientales</label>
                <select id="bgMusicSelect" onchange="changeMusic()">
                    <option value="none">Sin música ambiente</option>
                    <option value="tecno">Tecno / Electronic Beat (Energético)</option>
                    <option value="chill">Lo-Fi Chill Instrumental (Relajante)</option>
                    <option value="epic">Cinematic / Misterio (Fondo Profundo)</option>
                </select>
                <label>Volumen de Música <span id="valVol">20%</span></label>
                <input type="range" id="bgMusicVolume" min="0" max="100" value="20" oninput="document.getElementById('valVol').innerText=this.value+'%'; changeVolume();">
            </div>

            <!-- Títulos CapCut -->
            <div class="panel-title">4. Títulos Dinámicos</div>
            <div class="tool-group">
                <input type="text" id="editorText" value="Arrástrame en el cuadro" oninput="saveState(); updateEditor();">
                <label>Tamaño Fuente</label>
                <input type="range" id="textSize" min="16" max="70" value="30" oninput="updateEditor()">
                <input type="color" id="textColor" value="#ffffff" onchange="updateEditor()" style="width:100%; height:30px; border:none; cursor:pointer;">
            </div>
        </div>

        <!-- Monitor de Video -->
        <div class="preview-area">
            <div class="status-overlay" id="statusOverlay">🔴 GRABANDO MASTER COMPLETO... NO CIERRES LA PÁGINA</div>
            <div class="canvas-container" id="canvasContainer" style="cursor: move;">
                <canvas id="videoCanvas"></canvas>
            </div>
            <video id="hiddenVideo" loop playsinline></video>
            <video id="hiddenCam" autoplay playsinline></video>
            <img id="bgImageHidden" src="">
            
            <!-- Elemento de audio real oculto para música de fondo -->
            <audio id="bgAudioElement" loop crossorigin="anonymous"></audio>
        </div>
    </div>

    <!-- Línea de Tiempo e Historial -->
    <div class="timeline-section">
        <div class="timeline-header">
            <div class="btn-group">
                <button class="btn-action" id="btnPlayPause" onclick="togglePlay()"><i class="fa-solid fa-play"></i> Play</button>
                <button class="btn-action danger" onclick="splitVideo()"><i class="fa-solid fa-scissors"></i> Cortar (Split)</button>
                <button class="btn-action danger" onclick="deleteSegment()"><i class="fa-solid fa-trash"></i> Borrar Tramo</button>
            </div>
            <div style="font-size: 13px; color: #a1a1aa; font-family: monospace;" id="timeCode">00:00 / 00:00</div>
        </div>

        <div class="timeline-container" id="timelineWrapper">
            <div class="timeline-progress" id="timeProgress"></div>
            <div class="track-layer" id="trackVisual" style="left: 0%; width: 100%; display: none;">
                <i class="fa-solid fa-video" style="margin-right:6px;"></i> <span id="fileName">Clip Base</span>
            </div>
        </div>
    </div>

    <script>
        const audioEl = document.getElementById('bgAudioElement');

        // URLs de música instrumental real libre de derechos de autor
        const musicTracks = {
            tecno: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", // Sintetizadores rítmicos / Tecno up-beat
            chill: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // Instrumental relajado
            epic: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"   // Atmosférico profundo cinematográfico
        };

        function changeMusic() {
            const selected = document.getElementById('bgMusicSelect').value;
            if (selected === 'none') {
                audioEl.pause();
                audioEl.src = "";
            } else {
                audioEl.src = musicTracks[selected];
                audioEl.volume = document.getElementById('bgMusicVolume').value / 100;
                // Intentar reproducir (controlando políticas de interacción del navegador)
                audioEl.play().catch(e => console.log("Interacción requerida para arrancar el audio"));
            }
        }

        function changeVolume() {
            audioEl.volume = document.getElementById('bgMusicVolume').value / 100;
        }
    </script>

    <!-- Motor Gráfico Principal y Control de Edición -->
    <script>
        const video = document.getElementById('hiddenVideo');
        const camera = document.getElementById('hiddenCam');
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const bgImg = document.getElementById('bgImageHidden');
        
        let animationFrameId;
        let textX = 400, textY = 240, isDragging = false;
        let isCamActive = false;
        let isRecording = false;

        // Historial de cambios (Undo / Redo)
        let historyStack = [];
        let undoStack = [];

        canvas.width = 854; canvas.height = 480;
        ctx.fillStyle = "#111113"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#a855f7"; ctx.font = "bold 16px Inter"; ctx.textAlign = "center";
        ctx.fillText("ESTUDIO MULTIPREMIUM ACTIVADO - V3", canvas.width/2, canvas.height/2 - 20);
        ctx.fillStyle = "#71717a"; ctx.font = "13px Inter";
        ctx.fillText("Importa tu video, añade tecno o chill de fondo y exporta tu pieza terminada completa", canvas.width/2, canvas.height/2 + 10);

        function saveState() {
            const state = {
                text: document.getElementById('editorText').value,
                textX: textX, textY: textY,
                textSize: document.getElementById('textSize').value,
                textColor: document.getElementById('textColor').value,
                currentTime: video.currentTime
            };
            historyStack.push(JSON.stringify(state));
            undoStack = [];
        }

        function undo() {
            if (historyStack.length > 1) {
                undoStack.push(historyStack.pop());
                const state = JSON.parse(historyStack[historyStack.length - 1]);
                applyState(state);
            }
        }

        function redo() {
            if (undoStack.length > 0) {
                const stateStr = undoStack.pop();
                historyStack.push(stateStr);
                applyState(JSON.parse(stateStr));
            }
        }

        function applyState(state) {
            document.getElementById('editorText').value = state.text;
            textX = state.textX; textY = state.textY;
            document.getElementById('textSize').value = state.textSize;
            document.getElementById('textColor').value = state.textColor;
            video.currentTime = state.currentTime;
            updateEditor();
        }

        function loadVideo(event) {
            const file = event.target.files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                video.load();
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('trackVisual').style.display = 'flex';
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    saveState();
                    updateEditor();
                };
            }
        }

        function toggleCamera() {
            if (!isCamActive) {
                navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false })
                .then(stream => {
                    camera.srcObject = stream;
                    isCamActive = true;
                    document.getElementById('btnCam').classList.add('primary');
                    document.getElementById('btnCam').innerText = "🔴 Apagar Cámara";
                    renderLoop();
                }).catch(err => alert("No se pudo acceder a la cámara web. Asegúrate de dar los permisos."));
            } else {
                let stream = camera.srcObject;
                if (stream) stream.getTracks().forEach(track => track.stop());
                isCamActive = false;
                document.getElementById('btnCam').classList.remove('primary');
                document.getElementById('btnCam').innerText = "Activar Mi Cámara Web";
            }
        }

        function changeScenario() {
            const select = document.getElementById('bgScenario').value;
            if (select === 'custom') {
                document.getElementById('customBgUpload').click();
            } else if (select === 'set_moderno') {
                bgImg.src = "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=800&auto=format&fit=crop";
            } else if (select === 'misterio') {
                bgImg.src = "https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=800&auto=format&fit=crop";
            } else if (select === 'folclor') {
                bgImg.src = "https://images.unsplash.com/photo-1533105079780-92b9be482077?w=800&auto=format&fit=crop";
            } else {
                bgImg.src = "";
            }
            updateEditor();
        }

        function loadCustomBg(event) {
            const file = event.target.files[0];
            if (file) bgImg.src = URL.createObjectURL(file);
            updateEditor();
        }

        function togglePlay() {
            if (video.src) {
                if (video.paused) { 
                    video.play(); 
                    if(audioEl.src) audioEl.play();
                    document.getElementById('btnPlayPause').innerHTML = '<i class="fa-solid fa-pause"></i> Pause';
                    renderLoop(); 
                } 
                else { 
                    video.pause(); 
                    audioEl.pause();
                    document.getElementById('btnPlayPause').innerHTML = '<i class="fa-solid fa-play"></i> Play';
                    cancelAnimationFrame(animationFrameId); 
                }
            }
        }

        function renderLoop() {
            updateEditor();
            if (!video.paused || isCamActive || isRecording) {
                animationFrameId = requestAnimationFrame(renderLoop);
            }
        }

        // PROCESADOR CHROMA KEY EN TIEMPO REAL
        function updateEditor() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (document.getElementById('bgScenario').value !== 'none' && bgImg.src) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            }

            if (video.src && video.readyState >= 2) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }

            if (isCamActive && camera.readyState >= 2) {
                if (document.getElementById('bgScenario').value !== 'none') {
                    let tempCanvas = document.createElement('canvas');
                    tempCanvas.width = 320; tempCanvas.height = 240;
                    let tempCtx = tempCanvas.getContext('2d');
                    tempCtx.drawImage(camera, 0, 0, 320, 240);
                    
                    let frame = tempCtx.getImageData(0, 0, 320, 240);
                    let l = frame.data.length / 4;
                    let tolerance = document.getElementById('chromaKeyTolerance').value;

                    for (let i = 0; i < l; i++) {
                        let r = frame.data[i * 4 + 0];
                        let g = frame.data[i * 4 + 1];
                        let b = frame.data[i * 4 + 2];
                        
                        if (g > 100 && g > r && g > b || (r > 160 && g > 160 && b > 160)) {
                            frame.data[i * 4 + 3] = 0;
                        }
                    }
                    tempCtx.putImageData(frame, 0, 0);
                    ctx.drawImage(tempCanvas, canvas.width - 240, canvas.height - 190, 220, 170);
                } else {
                    ctx.strokeStyle = "var(--neon)"; ctx.lineWidth = 3;
                    ctx.strokeRect(canvas.width - 245, canvas.height - 195, 230, 175);
                    ctx.drawImage(camera, canvas.width - 240, canvas.height - 190, 220, 170);
                }
            }

            const text = document.getElementById('editorText').value;
            if (text) {
                const fontSize = document.getElementById('textSize').value;
                ctx.font = `bold ${fontSize}px system-ui`;
                ctx.textAlign = 'center';
                ctx.strokeStyle = '#000000'; ctx.lineWidth = 5;
                ctx.strokeText(text, textX, textY);
                ctx.fillStyle = document.getElementById('textColor').value;
                ctx.fillText(text, textX, textY);
            }

            if (video.duration) {
                document.getElementById('timeCode').innerText = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                document.getElementById('timeProgress').style.width = (video.currentTime / video.duration * 100) + '%';
            }
        }

        function formatTime(s) {
            return Math.floor(s / 60).toString().padStart(2, '0') + ':' + Math.floor(s % 60).toString().padStart(2, '0');
        }

        function splitVideo() {
            if (!video.src) return;
            alert(`✂️ Corte realizado con éxito en el segundo ${formatTime(video.currentTime)}.`);
            saveState();
        }

        function deleteSegment() {
            if (!video.src) return;
            saveState();
            video.currentTime = 0;
            updateEditor();
            alert("🗑️ Tramo removido y limpiado.");
        }

        // DRAG & DROP
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
        }
        document.getElementById('canvasContainer').addEventListener('mousedown', (e) => {
            const pos = getPos(e);
            if (Math.sqrt(Math.pow(pos.x - textX, 2) + Math.pow(pos.y - textY, 2)) < 120) isDragging = true;
        });
        window.addEventListener('mousemove', (e) => { if (isDragging) { const pos = getPos(e); textX = pos.x; textY = pos.y; updateEditor(); } });
        window.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; saveState(); } });

        
        // GRABACIÓN COMPLETA AUTOMÁTICA DEL VIDEO
        function exportVideo() {
            if (!video.src) {
                alert("Primero debes importar un archivo de video para exportar el resultado.");
                return;
            }

            // Detener previsualizaciones previas
            video.pause();
            audioEl.pause();
            isRecording = true;

            const exportBtn = document.getElementById('btnExport');
            const overlay = document.getElementById('statusOverlay');
            
            exportBtn.disabled = true;
            exportBtn.innerText = "Grabando Render...";
            overlay.style.display = 'block';

            // Regresar el video al inicio absoluto para capturarlo completo
            video.currentTime = 0;

            // Capturar la pista visual del lienzo (Canvas) a 30 cuadros estables
            const stream = canvas.captureStream(30);
            
            // Intentar consolidar canales de audio mezclados (Base + Música de fondo)
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const dest = audioContext.createMediaStreamDestination();
                
                const sourceVideo = audioContext.createMediaElementSource(video);
                sourceVideo.connect(dest);
                sourceVideo.connect(audioContext.destination);

                if(audioEl.src) {
                    const sourceAudio = audioContext.createMediaElementSource(audioEl);
                    sourceAudio.connect(dest);
                    sourceAudio.connect(audioContext.destination);
                }

                stream.addTrack(dest.stream.getAudioTracks()[0]);
            } catch(e) {
                console.log("Aviso sobre el ruteo de hardware de audio unificado.");
            }

            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            const chunks = [];

            recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

            recorder.onstop = () => {
                isRecording = false;
                const blob = new Blob(chunks, { type: 'video/webm' });
                const downloadUrl = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `Video_Final_Studio_${Date.now()}.webm`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                // Reestablecer Interfaz
                exportBtn.disabled = false;
                exportBtn.innerText = "Exportar Master Completo";
                overlay.style.display = 'none';
                
                video.currentTime = 0;
                document.getElementById('btnPlayPause').innerHTML = '<i class="fa-solid fa-play"></i> Play';
                updateEditor();
                alert("¡Exportación Exitosa! Tu video se procesó por completo con los textos, pistas de tecno/chill y se guardó en tus descargas.");
            };

            // Iniciar reproducción y guardado coordinado cuadro por cuadro
            recorder.start();
            video.play();
            if(audioEl.src) audioEl.play();
            renderLoop();

            // Monitorear el fin exacto del video base para frenar la captura y descargar automáticamente
            const monitorEnd = setInterval(() => {
                if (video.currentTime >= video.duration || video.ended) {
                    clearInterval(monitorEnd);
                    video.pause();
                    audioEl.pause();
                    recorder.stop();
                }
            }, 100);
        }
    </script>
</body>
</html>
